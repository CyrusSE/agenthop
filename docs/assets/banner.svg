<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-label="agenthop — hop AI coding sessions between agents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#09090b"/>
      <stop offset="55%" stop-color="#111118"/>
      <stop offset="100%" stop-color="#171322"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#e879f9"/>
    </linearGradient>
    <linearGradient id="arrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#d946ef"/>
    </linearGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#ffffff" opacity="0.045"/>
    </pattern>
    <style>
      .title { font: 700 58px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; letter-spacing: -0.03em; }
      .tagline { font: 500 24px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .mono { font: 500 17px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; letter-spacing: 0.02em; }
      .pill { font: 600 13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; letter-spacing: 0.04em; }
    </style>
  </defs>

  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#grid)"/>

  <!-- ambient glow -->
  <ellipse cx="280" cy="180" rx="220" ry="120" fill="#7c3aed" opacity="0.12" filter="url(#softGlow)"/>
  <ellipse cx="920" cy="210" rx="180" ry="90" fill="#db2777" opacity="0.08"/>

  <!-- frame inspired by TUI banner -->
  <g transform="translate(72,58)">
    <path d="M0 18 H118 M118 0 V18 M130 0 H248 M248 18 V36 M248 36 H130" fill="none" stroke="#3f3f46" stroke-width="2" stroke-linecap="round"/>
    <path d="M0 226 H118 M118 244 V226 M130 244 H248 M248 226 V208 M248 208 H130" fill="none" stroke="#3f3f46" stroke-width="2" stroke-linecap="round"/>
    <polygon points="124,8 132,18 124,28 116,18" fill="url(#glow)"/>
    <rect x="18" y="72" width="212" height="100" rx="14" fill="#121217" stroke="#27272a" stroke-width="1.5"/>
    <text x="124" y="118" text-anchor="middle" class="pill" fill="#d4d4d8">agenthop</text>
    <text x="124" y="148" text-anchor="middle" class="mono" fill="#71717a">session browser</text>
  </g>

  <!-- agent hop diagram -->
  <g transform="translate(390,118)">
    <!-- Claude -->
    <rect x="0" y="34" width="118" height="44" rx="22" fill="#18181b" stroke="#3f3f46"/>
    <circle cx="24" cy="56" r="7" fill="#f87171"/>
    <text x="42" y="61" class="pill" fill="#e4e4e7">Claude</text>

    <!-- arrow 1 -->
    <path d="M128 56 H168" stroke="url(#arrow)" stroke-width="3" stroke-linecap="round"/>
    <polygon points="168,56 158,50 158,62" fill="#c026d3"/>

    <!-- hop node -->
    <circle cx="198" cy="56" r="22" fill="#1a1028" stroke="url(#glow)" stroke-width="2.5"/>
    <path d="M190 56 H206 M198 48 V64" stroke="#f5d0fe" stroke-width="2.5" stroke-linecap="round"/>

    <!-- arrow 2 -->
    <path d="M228 56 H268" stroke="url(#arrow)" stroke-width="3" stroke-linecap="round"/>
    <polygon points="268,56 258,50 258,62" fill="#c026d3"/>

    <!-- Codex -->
    <rect x="278" y="34" width="108" height="44" rx="22" fill="#18181b" stroke="#3f3f46"/>
    <circle cx="302" cy="56" r="7" fill="#22d3ee"/>
    <text x="320" y="61" class="pill" fill="#e4e4e7">Codex</text>

    <!-- arrow 3 -->
    <path d="M396 56 H436" stroke="url(#arrow)" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
    <polygon points="436,56 426,50 426,62" fill="#a855f7" opacity="0.55"/>

    <!-- Cursor -->
    <rect x="446" y="34" width="112" height="44" rx="22" fill="#18181b" stroke="#3f3f46" opacity="0.85"/>
    <circle cx="470" cy="56" r="7" fill="#60a5fa"/>
    <text x="488" y="61" class="pill" fill="#d4d4d8">Cursor</text>
  </g>

  <!-- wordmark + copy -->
  <text x="390" y="248" class="title" fill="#fafafa">agenthop</text>
  <text x="392" y="292" class="tagline" fill="#a1a1aa">Hop AI coding sessions between agents</text>
  <text x="392" y="326" class="mono" fill="#71717a">browse · preview · migrate · resume</text>

  <!-- right accent card -->
  <g transform="translate(930,92)">
    <rect x="0" y="0" width="198" height="176" rx="16" fill="#101015" stroke="#27272a"/>
    <rect x="16" y="20" width="72" height="10" rx="5" fill="#27272a"/>
    <rect x="16" y="42" width="166" height="8" rx="4" fill="#3f3f46" opacity="0.7"/>
    <rect x="16" y="58" width="140" height="8" rx="4" fill="#3f3f46" opacity="0.45"/>
    <rect x="16" y="74" width="152" height="8" rx="4" fill="#3f3f46" opacity="0.35"/>
    <rect x="16" y="104" width="166" height="52" rx="10" fill="#18181b" stroke="#3f3f46"/>
    <text x="24" y="128" class="mono" fill="#a78bfa">$ agenthop migrate</text>
    <text x="24" y="148" class="mono" fill="#71717a">claude → codex</text>
  </g>
</svg>
