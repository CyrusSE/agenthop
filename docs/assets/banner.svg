<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-label="agenthop — hop AI coding sessions between agents">
  <defs>
    <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
      <path d="M0 4 H4" stroke="#ffffff" stroke-width="0.5" opacity="0.03"/>
    </pattern>
    <clipPath id="clip-table">
      <rect x="576" y="72" width="568" height="148"/>
    </clipPath>
    <clipPath id="clip-cmd">
      <rect x="576" y="232" width="568" height="32"/>
    </clipPath>
  </defs>

  <rect width="1200" height="280" fill="#0a0a0b"/>
  <rect width="1200" height="280" fill="url(#scan)"/>
  <line x1="0" y1="279.5" x2="1200" y2="279.5" stroke="#27272a" stroke-width="1"/>

  <!-- left -->
  <g transform="translate(56, 48)">
    <path d="M0 10 H44 M44 0 V10 M50 0 H96 M96 10 V20 M96 20 H50" fill="none" stroke="#3f3f46" stroke-width="1.25" stroke-linecap="square"/>
    <path d="M0 76 H44 M44 86 V76 M50 86 H96 M96 76 V66 M96 66 H50" fill="none" stroke="#3f3f46" stroke-width="1.25" stroke-linecap="square"/>
    <rect x="46" y="3" width="7" height="7" transform="rotate(45 49.5 6.5)" fill="#14b8a6"/>

    <text x="0" y="64" fill="#fafafa" font-family="'IBM Plex Mono','JetBrains Mono','SF Mono',Menlo,Consolas,monospace" font-size="48" font-weight="600" letter-spacing="-2">agenthop</text>
    <text x="0" y="98" fill="#71717a" font-family="'IBM Plex Mono','JetBrains Mono','SF Mono',Menlo,Consolas,monospace" font-size="16">Hop sessions between AI agents</text>
    <text x="0" y="126" fill="#52525b" font-family="'IBM Plex Mono','JetBrains Mono','SF Mono',Menlo,Consolas,monospace" font-size="16">list · preview · migrate · resume</text>
  </g>

  <line x1="548" y1="40" x2="548" y2="240" stroke="#27272a" stroke-width="1"/>

  <g transform="translate(512, 118)" opacity="0.85">
    <path d="M0 10 H22" stroke="#14b8a6" stroke-width="2" stroke-linecap="round"/>
    <path d="M17 5 L24 10 L17 15" fill="none" stroke="#14b8a6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M30 10 H50" stroke="#3f3f46" stroke-width="1.5" stroke-linecap="round" stroke-dasharray="3 4"/>
    <path d="M45 5 L52 10 L45 15" fill="none" stroke="#3f3f46" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="576" y="62" fill="#52525b" font-family="'IBM Plex Mono','JetBrains Mono','SF Mono',Menlo,Consolas,monospace" font-size="10" font-weight="500" letter-spacing="0.8">SESSION BROWSER</text>

  <!-- session table -->
  <rect x="576" y="72" width="568" height="148" fill="#111113" stroke="#27272a" stroke-width="1"/>
  <line x1="576" y1="100" x2="1144" y2="100" stroke="#27272a" stroke-width="1"/>
  <line x1="640" y1="100" x2="640" y2="220" stroke="#27272a" stroke-width="1" opacity="0.45"/>
  <line x1="732" y1="100" x2="732" y2="220" stroke="#27272a" stroke-width="1" opacity="0.45"/>

  <g clip-path="url(#clip-table)">
    <text x="588" y="92" fill="#3f3f46" font-family="'IBM Plex Mono','JetBrains Mono','SF Mono',Menlo,Consolas,monospace" font-size="10" font-weight="500" letter-spacing="0.8">WHEN</text>
    <text x="652" y="92" fill="#3f3f46" font-family="'IBM Plex Mono','JetBrains Mono','SF Mono',Menlo,Consolas,monospace" font-size="10" font-weight="500" letter-spacing="0.8">AGENT</text>
    <text x="744" y="92" fill="#3f3f46" font-family="'IBM Plex Mono','JetBrains Mono','SF Mono',Menlo,Consolas,monospace" font-size="10" font-weight="500" letter-spacing="0.8">TITLE</text>

    <text x="588" y="124" fill="#52525b" font-family="'IBM Plex Mono','JetBrains Mono','SF Mono',Menlo,Consolas,monospace" font-size="12">3m</text>
    <circle cx="646" cy="120" r="3" fill="#f87171"/>
    <text x="656" y="124" fill="#a1a1aa" font-family="'IBM Plex Mono','JetBrains Mono','SF Mono',Menlo,Consolas,monospace" font-size="12">claude</text>
    <text x="744" y="124" fill="#d4d4d8" font-family="'IBM Plex Mono','JetBrains Mono','SF Mono',Menlo,Consolas,monospace" font-size="12">Auth middleware</text>

    <text x="588" y="152" fill="#52525b" font-family="'IBM Plex Mono','JetBrains Mono','SF Mono',Menlo,Consolas,monospace" font-size="12">1h</text>
    <circle cx="646" cy="148" r="3" fill="#22d3ee"/>
    <text x="656" y="152" fill="#a1a1aa" font-family="'IBM Plex Mono','JetBrains Mono','SF Mono',Menlo,Consolas,monospace" font-size="12">codex</text>
    <text x="744" y="152" fill="#d4d4d8" font-family="'IBM Plex Mono','JetBrains Mono','SF Mono',Menlo,Consolas,monospace" font-size="12">Index path fix</text>

    <text x="588" y="180" fill="#52525b" font-family="'IBM Plex Mono','JetBrains Mono','SF Mono',Menlo,Consolas,monospace" font-size="12">1d</text>
    <circle cx="646" cy="176" r="3" fill="#60a5fa"/>
    <text x="656" y="180" fill="#a1a1aa" font-family="'IBM Plex Mono','JetBrains Mono','SF Mono',Menlo,Consolas,monospace" font-size="12">cursor</text>
    <text x="744" y="180" fill="#a1a1aa" font-family="'IBM Plex Mono','JetBrains Mono','SF Mono',Menlo,Consolas,monospace" font-size="12">Title extraction</text>

    <text x="588" y="208" fill="#3f3f46" font-family="'IBM Plex Mono','JetBrains Mono','SF Mono',Menlo,Consolas,monospace" font-size="12">w here · a everywhere · / filter</text>
  </g>

  <!-- command -->
  <rect x="576" y="232" width="568" height="32" fill="#0a0a0b" stroke="#27272a" stroke-width="1"/>
  <g clip-path="url(#clip-cmd)">
    <text x="588" y="253" fill="#14b8a6" font-family="'IBM Plex Mono','JetBrains Mono','SF Mono',Menlo,Consolas,monospace" font-size="11" font-weight="500">$</text>
    <text x="602" y="253" fill="#71717a" font-family="'IBM Plex Mono','JetBrains Mono','SF Mono',Menlo,Consolas,monospace" font-size="11" font-weight="500">agenthop migrate &lt;id&gt; --from claude --to codex</text>
  </g>
</svg>
