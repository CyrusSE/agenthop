# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2
project_name: agenthop
builds:
  - id: agenthop
    main: ./cmd/agenthop
    binary: agenthop
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
checksum:
  name_template: checksums.txt
changelog:
  sort: asc
